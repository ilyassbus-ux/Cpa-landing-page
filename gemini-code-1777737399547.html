<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Game Resource Injector</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #00ffcc;
            --bg-dark: #050505;
            --card-bg: #111111;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: border-flow 3s linear infinite;
        }

        @keyframes border-flow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; color: var(--accent); text-transform: uppercase; }
        p.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--accent); font-weight: bold; }

        input, select {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .gen-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .gen-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        /* Loading Overlay */
        #loader-section { display: none; margin-top: 20px; }
        .progress-container {
            width: 100%;
            background: #222;
            height: 12px;
            border-radius: 6px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.4s;
        }
        #status-text { font-size: 0.85rem; color: var(--accent); font-family: monospace; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="glass-card" id="main-card">
        <h1>RESOURCES TOOL</h1>
        <p class="subtitle">Secure External Injection v4.1</p>

        <div id="form-section">
            <div class="input-group">
                <label><i class="fa-solid fa-user"></i> USERNAME / PLAYER ID</label>
                <input type="text" id="username" placeholder="Type your ID here...">
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-microchip"></i> SELECT PLATFORM</label>
                <select id="platform">
                    <option value="android">Android Devices</option>
                    <option value="ios">iOS / Apple</option>
                    <option value="pc">Windows PC</option>
                </select>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-gem"></i> RESOURCE AMOUNT</label>
                <select id="amount">
                    <option>5,000 FREE UNITS</option>
                    <option>15,000 FREE UNITS</option>
                    <option>50,000 FREE UNITS</option>
                </select>
            </div>

            <button class="gen-btn" onclick="startInjection()">GENERATE NOW</button>
        </div>

        <div id="loader-section">
            <h3 id="loader-title">INITIALIZING...</h3>
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
            <div id="status-text">Connecting to game server...</div>
        </div>
    </div>
</div>

<script>
    function startInjection() {
        const user = document.getElementById('username').value;
        if (user.length < 3) {
            alert("Please enter a valid Player ID");
            return;
        }

        document.getElementById('form-section').style.display = 'none';
        document.getElementById('loader-section').style.display = 'block';

        let steps = [
            { p: 10, t: "Connecting to global database..." },
            { p: 30, t: "Locating User ID: " + user + "..." },
            { p: 50, t: "Bypassing anti-cheat protection..." },
            { p: 75, t: "Injecting selected resources..." },
            { p: 90, t: "Cleaning injection traces..." },
            { p: 100, t: "HUMAN VERIFICATION REQUIRED!" }
        ];

        let i = 0;
        const interval = setInterval(() => {
            if (i >= steps.length) {
                clearInterval(interval);
                // توجيه لصفحة الـ CPA الخاصة بك
                window.location.href = "YOUR_CONTENT_LOCKER_LINK"; 
                return;
            }
            document.getElementById('bar').style.width = steps[i].p + "%";
            document.getElementById('status-text').innerText = steps[i].t;
            i++;
        }, 1800);
    }
</script>

</body>
</html>
